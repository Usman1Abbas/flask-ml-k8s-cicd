<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="flask-ml-k8s-cicd — Flask on Kubernetes with end-to-end CI/CD">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#042f2e"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#99f6e4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#99f6e4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: CI/CD loop wrapping a containerized Kubernetes deployment -->
  <g transform="translate(980,190)" stroke="#99f6e4" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- CI/CD continuous loop -->
    <path d="M -95 -8 A 95 95 0 1 1 -55 70"/>
    <!-- arrowhead closing the loop -->
    <path d="M -78 48 L -55 70 L -33 47"/>
    <!-- container box at center -->
    <rect x="-46" y="-46" width="92" height="92" rx="10"/>
    <!-- container lid + dividers -->
    <line x1="-46" y1="-18" x2="46" y2="-18"/>
    <line x1="-16" y1="-46" x2="-16" y2="-18"/>
    <line x1="16" y1="-46" x2="16" y2="-18"/>
    <!-- k8s wheel hub -->
    <circle cx="0" cy="16" r="14"/>
    <line x1="0" y1="2" x2="0" y2="-8"/>
    <line x1="12" y1="24" x2="22" y2="31"/>
    <line x1="-12" y1="24" x2="-22" y2="31"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff">flask-ml-k8s-cicd</text>
  <text x="84" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#99f6e4">CONTAINERIZED FLASK · KUBERNETES · CI/CD</text>
  <text x="84" y="272" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#f0fdfa">A Flask service shipped end-to-end with Docker, Kubernetes and automated pipelines.</text>
  <text x="84" y="312" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#5eead4">flask · docker · kubernetes · github-actions · jenkins · pytest</text>
</svg>
